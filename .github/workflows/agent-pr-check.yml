name: Agent PR Check

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  # -------------------------------------------------------------------------
  # Detect if this is an agent-generated PR
  # -------------------------------------------------------------------------
  detect-agent-pr:
    runs-on: ubuntu-latest
    outputs:
      is_agent_pr: ${{ steps.check.outputs.is_agent_pr }}
      agent_type: ${{ steps.check.outputs.agent_type }}
    steps:
      - id: check
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ "$BRANCH" == agent/* ]]; then
            echo "is_agent_pr=true" >> $GITHUB_OUTPUT
            echo "agent_type=claude" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == copilot/* ]]; then
            echo "is_agent_pr=true" >> $GITHUB_OUTPUT
            echo "agent_type=copilot" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == codex/* ]]; then
            echo "is_agent_pr=true" >> $GITHUB_OUTPUT
            echo "agent_type=codex" >> $GITHUB_OUTPUT
          else
            echo "is_agent_pr=false" >> $GITHUB_OUTPUT
            echo "agent_type=human" >> $GITHUB_OUTPUT
          fi

  # -------------------------------------------------------------------------
  # Validate the PR (runs for all PRs)
  # -------------------------------------------------------------------------
  validate:
    runs-on: ubuntu-latest
    needs: detect-agent-pr
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for sensitive file changes
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "Files changed:"
          echo "$CHANGED"

          SENSITIVE=$(echo "$CHANGED" | grep -E "(auth|security|secret|password|\.env|\.pem|\.key|workflows/)" || true)
          if [ -n "$SENSITIVE" ] && [ "${{ needs.detect-agent-pr.outputs.is_agent_pr }}" == "true" ]; then
            echo "⚠️ AGENT PR CHANGED SENSITIVE FILES:"
            echo "$SENSITIVE"
            echo ""
            echo "These changes require careful human review before merging."
          fi

      - name: Check PR is draft (agent PRs must be draft initially)
        if: needs.detect-agent-pr.outputs.is_agent_pr == 'true'
        run: |
          IS_DRAFT="${{ github.event.pull_request.draft }}"
          if [ "$IS_DRAFT" == "false" ] && [ "${{ github.event.action }}" == "opened" ]; then
            echo "⚠️ Agent PR opened as non-draft. Please convert to Draft for initial review."
          fi

      # TODO: Add your project's lint, test, and typecheck commands below
      - name: Install dependencies
        run: echo "TODO: add your install command (e.g. npm ci / pip install -r requirements.txt)"

      - name: Run lint
        run: echo "TODO: add your lint command (e.g. npm run lint / ruff check .)"

      - name: Run tests
        run: echo "TODO: add your test command (e.g. npm test / pytest tests/ -v)"

      - name: Run type check
        run: echo "TODO: add your typecheck command (e.g. npx tsc --noEmit / mypy src/)"

  # -------------------------------------------------------------------------
  # Agent-specific: add label and request reviewer
  # -------------------------------------------------------------------------
  label-and-assign:
    runs-on: ubuntu-latest
    needs: detect-agent-pr
    if: needs.detect-agent-pr.outputs.is_agent_pr == 'true'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const agentType = '${{ needs.detect-agent-pr.outputs.agent_type }}';
            const labelMap = {
              claude: 'agent: claude',
              copilot: 'agent: copilot',
              codex: 'agent: codex'
            };

            // Add agent label
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [labelMap[agentType] || 'agent-generated', 'needs-human-review']
              });
            } catch(e) {
              console.log('Label may not exist yet:', e.message);
            }

            // TODO: Replace with your GitHub username(s) to always require human review
            // await github.rest.pulls.requestReviewers({
            //   owner: context.repo.owner,
            //   repo: context.repo.repo,
            //   pull_number: context.issue.number,
            //   reviewers: ['your-username']
            // });
